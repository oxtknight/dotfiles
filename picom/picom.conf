# --- Backend Settings ---
# Use GLX (OpenGL) for high performance and gaming
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;

# --- VSync ---
# Essential for preventing screen tearing
vsync = true;

# --- Shadows ---
shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Polybar'",
  "class_g ?= 'Notify-osd'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- Fading ---
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# --- Transparency ---
inactive-opacity = 0.90;
frame-opacity = 1.0;
inactive-opacity-override = false;
focus-exclude = [ "class_g = 'Cairo-clock'" ];

# --- Rules ---
# This makes sure Steam and Games stay 100% opaque
opacity-rule = [
  "100:class_g = 'St'",
  "100:class_g = 'Steam'",
  "100:class_g = 'Lutris'",
  "100:class_g = 'Ryujinx'"
];

# --- Corners ---
corner-radius = 0; # Set to 8 or 10 if you want rounded corners

# --- General ---
log-level = "warn";
